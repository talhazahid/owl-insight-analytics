      <stop stop-color="#14151D"/>
      <stop offset="1" stop-color="#0D0E14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1092 144) rotate(90) scale(148)">
      <stop stop-color="#7F5AF0"/>
