  <rect x="668" y="498" width="266" height="54" rx="16" fill="#FFFFFF"/>
  <text x="750" y="532" fill="#090A0F" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">owlinsight.dev</text>

